name: docker-vllm-amd

on:
  push:
    tags:
      - 'docker-vllm-amd-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag suffix'
        required: false
        default: 'latest'
      push:
        description: 'Push to Docker Hub (requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets)'
        required: false
        default: 'false'

env:
  HAS_DOCKER_CREDS: ${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.HAS_DOCKER_CREDS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push if creds present)
        uses: docker/build-push-action@v5
        with:
          context: docker
          file: docker/Dockerfile.vllm-amd
          platforms: linux/amd64
          push: ${{ env.HAS_DOCKER_CREDS == 'true' }}
          tags: |
            thetom/vllm-turboquant:rocm-7.2
            thetom/vllm-turboquant:${{ github.event.inputs.tag || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
